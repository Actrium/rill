pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
}
plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    // The demo links only the local Rill native module. The dynamic React Native
    // CLI autolinker scans the repository root through the file: dependency and
    // can stall on generated native build artifacts in this workspace.
    ex.autolinkLibrariesFromConfigFile(file("autolinking.json"))
}

rootProject.name = 'RillDemo'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
