name: Benchmarks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run benchmark smoke
        run: |
          {
            echo "# Rill benchmark smoke"
            echo
            echo "## Unit test timing"
            /usr/bin/time -p bun run test:unit
            echo
            echo "## Guest bundle timing"
            /usr/bin/time -p bun run test:bundle
          } 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-output.txt
          retention-days: 30
