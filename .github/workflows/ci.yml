name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run preflight
        run: bun run preflight

      - name: Run guest bundle tests
        run: bun run test:bundle

      - name: Run native tests
        run: bun run test:native

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium

      - name: Run WASM sandbox E2E
        run: bun run test:e2e:wasm

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # crates/ is the native (non-JS) WASM guest workspace. The .wasm test
    # fixtures under src/host/wasm-guest/__tests__/fixtures/ are committed to
    # git and are NOT compared here (wasm output is not byte-reproducible
    # across toolchains): after changing crates/, rebuild them manually with
    # crates/build.sh. This job only keeps the Rust sources themselves green.
    defaults:
      run:
        working-directory: crates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint (clippy, wasm target)
        run: cargo clippy --workspace --target wasm32-unknown-unknown -- -D warnings

      - name: Build WASM guests
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      # The DWARF debug branch of build.sh names crates explicitly (GUESTS),
      # so a rename in the workspace can break it while --workspace above stays
      # green. Build it for real so the list can never drift again.
      - name: Build debug (DWARF) WASM guests
        run: RILL_GUEST_DEBUG=1 bash build.sh

      # No `cargo test` step yet: the guest cdylibs are wasm32-only (their
      # panic handler uses core::arch::wasm32) and the workspace has no
      # host-runnable tests. Add one here once host-target unit tests land.
