apply plugin: 'com.android.library'

def reactNativeDir = file("$rootDir/../node_modules/react-native")
def reactProperties = new Properties()
file("$reactNativeDir/ReactAndroid/gradle.properties").withInputStream { reactProperties.load(it) }

android {
    namespace 'com.rill.sandbox'
    compileSdkVersion rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion

    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        externalNativeBuild {
            cmake {
                cppFlags '-std=c++17 -fexceptions -frtti'
                arguments '-DANDROID_STL=c++_shared',
                          "-DREACT_NATIVE_DIR=${reactNativeDir}"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path 'CMakeLists.txt'
        }
    }

    buildFeatures {
        prefab true
    }

    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
        }
    }
}

repositories {
    google()
    mavenCentral()
    maven { url "$reactNativeDir/../@react-native/gradle-plugin/react-native-gradle-plugin/build/publications/maven" }
}

dependencies {
    implementation 'com.facebook.react:react-android'
}
